name: Build AFL++ (LinUCB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show runner toolchain
        shell: bash
        run: |
          set -eux
          uname -a
          gcc --version
          g++ --version
          clang-18 --version || true
          clang --version || true
          cmake --version
          python3 --version
          cargo --version || true

      - name: Install missing build dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update

          GCC_MAJOR="$(gcc -dumpversion | cut -d. -f1)"

          REQUIRED_PKGS=(
            build-essential
            python3-dev
            automake
            cmake
            git
            flex
            bison
            libglib2.0-dev
            libpixman-1-dev
            python3-setuptools
            cargo
            libgtk-3-dev
            lld-18
            llvm-18
            llvm-18-dev
            clang-18
            gcc-${GCC_MAJOR}-plugin-dev
            libstdc++-${GCC_MAJOR}-dev
          )

          MISSING_PKGS=()
          for pkg in "${REQUIRED_PKGS[@]}"; do
            if ! dpkg -s "$pkg" >/dev/null 2>&1; then
              MISSING_PKGS+=("$pkg")
            fi
          done

          if [ "${#MISSING_PKGS[@]}" -gt 0 ]; then
            sudo apt-get install -y "${MISSING_PKGS[@]}"
          fi

      - name: Verify llvm-config
        shell: bash
        run: |
          set -eux
          command -v llvm-config-18
          llvm-config-18 --version

      - name: Clean
        shell: bash
        run: |
          make clean || true

      - name: Build
        shell: bash
        env:
          CC: clang-18
          CXX: clang++-18
          LLVM_CONFIG: llvm-config-18
        run: |
          set -euxo pipefail
          make all DEBUG=1 INTROSPECTION=1 LLVM_CONFIG="$LLVM_CONFIG" -j"$(nproc)"

      - name: Sanity checks
        shell: bash
        run: |
          set -eux
          test -x ./afl-fuzz
          test -x ./afl-cc
          ./afl-fuzz -h | grep -i "linucb" || true
          ./afl-cc -hh || true

      - name: Upload build log artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-tree
          path: |
            config.h
            GNUmakefile
            instrumentation/**
            src/**
            include/**