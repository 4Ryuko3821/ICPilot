name: Riskins runtime-toggle fuzz

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-riskins:
    runs-on: ubuntu-24.04
    timeout-minutes: 355

    env:
      FUZZ_SECONDS: "10800"          # 3 hours
      AFL_SKIP_CPUFREQ: "1"
      AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES: "1"
      AFL_NO_UI: "1"
      AFL_NO_AFFINITY: "1"
      AFL_QUIET: "1"
      PREENY_SOCKET_SO: "desock.so"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show runner toolchain
        shell: bash
        run: |
          set -eux
          uname -a
          gcc --version
          g++ --version
          clang-18 --version || true
          clang --version || true
          llvm-config-18 --version || true
          cmake --version || true
          python3 --version
          nproc || true

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          GCC_MAJOR="$(gcc -dumpversion | cut -d. -f1)"
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            git \
            rsync \
            python3 \
            python3-dev \
            python3-setuptools \
            cmake \
            automake \
            autoconf \
            libtool \
            flex \
            bison \
            cargo \
            libini-config-dev \
            libseccomp-dev \
            libglib2.0-dev \
            libpixman-1-dev \
            libgtk-3-dev \
            lld-18 \
            llvm-18 \
            llvm-18-dev \
            clang-18 \
            gcc-${GCC_MAJOR}-plugin-dev \
            libstdc++-${GCC_MAJOR}-dev

      - name: Restore cJSON source cache
        id: cache-cjson-src
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/cJSON
          key: ${{ runner.os }}-cjson-src-v1.7.18

      - name: Build and install cJSON from source
        shell: bash
        run: |
          set -euxo pipefail
          if [ ! -d "${{ github.workspace }}/.cache/cJSON/.git" ]; then
            git clone --depth 1 --branch v1.7.18 https://github.com/DaveGamble/cJSON.git "${{ github.workspace }}/.cache/cJSON"
          fi

          cd "${{ github.workspace }}/.cache/cJSON"
          mkdir -p build
          cd build
          cmake .. \
            -DENABLE_CJSON_UTILS=On \
            -DENABLE_CJSON_TEST=Off \
            -DCMAKE_INSTALL_PREFIX=/usr
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig

      - name: Restore Preeny cache
        id: cache-preeny
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.deps/preeny
          key: ${{ runner.os }}-preeny-zardus-master-desock-v1

      - name: Build Preeny desock.so
        if: steps.cache-preeny.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf /tmp/preeny
          git clone --depth 1 https://github.com/zardus/preeny.git /tmp/preeny
          make -C /tmp/preeny/src desock.so
          mkdir -p "${{ github.workspace }}/.deps/preeny"
          cp /tmp/preeny/src/desock.so "${{ github.workspace }}/.deps/preeny/desock.so"
          test -f "${{ github.workspace }}/.deps/preeny/desock.so"
          ls -lah "${{ github.workspace }}/.deps/preeny/desock.so"

      - name: Export Preeny path
        shell: bash
        run: |
          set -eux
          test -f "${{ github.workspace }}/.deps/preeny/desock.so"
          echo "PREENY_DIR=${{ github.workspace }}/.deps/preeny" >> "$GITHUB_ENV"

      - name: Make helper scripts executable
        shell: bash
        run: |
          set -eux
          chmod +x .github/scripts/prepare-riskins-build.sh
          chmod +x .github/scripts/run-riskins-runtime-toggle-fuzz.sh

      - name: Prepare runner for AFL crash detection
        shell: bash
        run: |
          set -eux
          echo "Before: $(cat /proc/sys/kernel/core_pattern)"
          sudo sysctl -w kernel.core_pattern=core
          echo "After:  $(cat /proc/sys/kernel/core_pattern)"

      - name: Relax runner AFL settings
        shell: bash
        run: |
          set -eux
          sudo -E ./afl-system-config || true

      - name: Build AFL++ and both protocol targets
        shell: bash
        env:
          CC: clang-18
          CXX: clang++-18
          LLVM_CONFIG: llvm-config-18
        run: |
          set -euxo pipefail
          ./.github/scripts/prepare-riskins-build.sh

      - name: Run 4 fuzz campaigns in the same runner
        shell: bash
        run: |
          set -euxo pipefail
          ./.github/scripts/run-riskins-runtime-toggle-fuzz.sh

      - name: Print fuzz stats
        if: always()
        shell: bash
        run: |
          set -euxo pipefail

          OUT_ROOT="${RISKINS_WORKBASE}/fuzz-out"
          if [ ! -d "$OUT_ROOT" ]; then
            echo "fuzz output directory not found: $OUT_ROOT"
            exit 1
          fi

          print_one() {
            local case_dir="$1"
            local name
            local fstats=""
            name="$(basename "$case_dir")"

            if [ -f "$case_dir/default/fuzzer_stats" ]; then
              fstats="$case_dir/default/fuzzer_stats"
            elif [ -f "$case_dir/fuzzer_stats" ]; then
              fstats="$case_dir/fuzzer_stats"
            fi

            echo "============================================================"
            echo "CASE: $name"
            echo "DIR : $case_dir"
            echo "============================================================"

            if [ -n "$fstats" ]; then
              grep -E '^(command_line|run_time|execs_done|execs_per_sec|cycles_done|corpus_count|saved_crashes|saved_hangs|pending_total|max_depth|stability|bitmap_cvg|edges_found|var_byte_count|slowest_exec_ms)[[:space:]]*:' "$fstats" || cat "$fstats"
            else
              echo "missing fuzzer_stats"
            fi

            if [ -d "$case_dir/default/queue" ]; then
              echo "queue_files=$(find "$case_dir/default/queue" -maxdepth 1 -type f | wc -l)"
            elif [ -d "$case_dir/queue" ]; then
              echo "queue_files=$(find "$case_dir/queue" -maxdepth 1 -type f | wc -l)"
            fi

            if [ -d "$case_dir/default/crashes" ]; then
              echo "crash_files=$(find "$case_dir/default/crashes" -maxdepth 1 -type f ! -name README.txt | wc -l)"
            elif [ -d "$case_dir/crashes" ]; then
              echo "crash_files=$(find "$case_dir/crashes" -maxdepth 1 -type f ! -name README.txt | wc -l)"
            fi

            if [ -d "$case_dir/default/hangs" ]; then
              echo "hang_files=$(find "$case_dir/default/hangs" -maxdepth 1 -type f | wc -l)"
            elif [ -d "$case_dir/hangs" ]; then
              echo "hang_files=$(find "$case_dir/hangs" -maxdepth 1 -type f | wc -l)"
            fi

            if [ -f "$case_dir.console.log" ]; then
              echo "--- tail: $case_dir.console.log ---"
              tail -n 30 "$case_dir.console.log" || true
            fi

            echo
          }

          for d in "$OUT_ROOT"/*; do
            [ -d "$d" ] || continue
            print_one "$d"
          done